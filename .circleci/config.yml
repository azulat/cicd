version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:20.0.0
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: npm install
      - run:
          name: Run Unit Tests
          command: npm run test

  deploy:
    docker:
      - image: cimg/node:20.0.0
    steps:
      - checkout
      - run:
          name: Deploy to Vercel
          command: npx vercel --prod --yes --token=$VERCEL_TOKEN

workflows:
  version: 2
  ci_cd_workflow:
    jobs:
      - test:
          filters:
            branches:
              only: main
      - deploy:
          requires:
            - test
          filters:
            branches:
              only: main
